<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Web Importer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="toolbar">
        <input type="text" id="urlInput" value="https://www.svgrepo.com/" placeholder="Enter URL">
        <button id="goBtn">Go</button>
    </div>
    
    <div id="debugStatus" style="background: #a00; color: white; padding: 4px; font-size: 12px; text-align: center;">
        Injection Status: Waiting...
    </div>
    
    <div id="webview-container">
        <iframe id="browserView" src="https://www.svgrepo.com/"></iframe>
    </div>

    <!-- Adobe CEP Interface Library -->
    <script src="js/CSInterface.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
