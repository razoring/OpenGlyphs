<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Web Importer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="toolbar">
        <input type="text" id="urlInput" value="https://fonts.google.com/icons" placeholder="Enter URL">
        <button id="goBtn">Go</button>
        <button id="toggleHighlightBtn" title="Toggle Asset Selection">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-dashed-mouse-pointer"><path d="M12.034 12.681a.498.498 0 0 1 .647-.647l9 3.5a.5.5 0 0 1-.033.943l-3.444 1.068a1 1 0 0 0-.66.66l-1.067 3.443a.5.5 0 0 1-.943.033z"/><path d="M5 3a2 2 0 0 0-2 2"/><path d="M19 3a2 2 0 0 1 2 2"/><path d="M5 21a2 2 0 0 1-2-2"/><path d="M9 3h1"/><path d="M9 21h2"/><path d="M14 3h1"/><path d="M3 9v1"/><path d="M21 9v2"/><path d="M3 14v1"/></svg>
        </button>
    </div>
    
    <div id="debugStatus" style="background: #a00; color: white; padding: 4px; font-size: 12px; text-align: center;">
        Injection Status: Waiting...
    </div>
    
    <div id="webview-container">
        <iframe id="browserView" src="https://www.svgrepo.com/"></iframe>
    </div>

    <!-- Adobe CEP Interface Library -->
    <script src="js/CSInterface.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
